<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Authentication</title>
<link rel="stylesheet" href="css/login-style.css">
</head>
<body>
  <div class="box" id="bx">
    <div class="tabs">
        <button id="t1" class="act">Login</button>
        <button id="t2">Sign Up</button>
    </div>
    
    <form id="l" class="frm">
        <h2>Welcome Back</h2>
        <input type="text" id="login-cred" placeholder="Email or Username" required>
        <input type="password" id="login-pass" placeholder="Password" required>
        <button type="submit" class="btn">Log In</button>
    </form>

    <form id="s" class="frm" style="display:none;">
        <h2>Create Account</h2>
        <input type="text" id="signup-name" placeholder="Full Name" required>
        <input type="text" id="signup-user" placeholder="Username" required>
        <input type="email" id="signup-email" placeholder="Email Address" required>
        
        <input type="password" id="signup-pass" placeholder="Password" required>
        <input type="password" id="signup-confirm" placeholder="Confirm Password" required>
        <button type="submit" class="btn">Sign Up</button>
    </form>
</div>
  <script src="js/login-script.js"></script>
</body>
</html>
